; PlatformIO Project Configuration File
; AeroDashboard - Combined Weather + Todoist E-Paper Display
; Target: Elecrow CrowPanel ESP32-S3 5.79" E-Paper (792x272)

[platformio]
default_envs = esp32-s3-devkitc-1

[env:base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Enable PSRAM support (QIO Flash + OPI PSRAM on ESP32-S3)
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=1
    ; GxEPD2 display selection
    -DGXEPD2_DRIVER_CLASS=GxEPD2_579_GDEY0579T93
    ; Enable ArduinoJson v7 compatibility
    -DARDUINOJSON_ENABLE_PROGMEM=1

; Partition scheme with SPIFFS (8MB flash)
board_build.partitions = default_8MB.csv
board_build.flash_size = 8MB
board_build.filesystem = spiffs

; Library dependencies
lib_deps =
    ; Display
    zinggjm/GxEPD2@^1.5.8
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.16.1

    ; Networking & JSON
    bblanchon/ArduinoJson@^7.4.2

    ; Image processing
    bodmer/TJpg_Decoder@^1.1.0

    ; Time synchronization
    arduino-libraries/NTPClient@^3.2.1

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600

[env:esp32-s3-devkitc-1]
extends = env:base
; Build only main.cpp and libraries
build_src_filter = +<*> -<image_test.cpp>
; OTA upload settings
upload_protocol = espota
upload_port = 192.168.1.114
upload_flags =
    --auth=aero2026

[env:image_test]
extends = env:base
; Build only image_test.cpp and libraries
build_src_filter = +<image_test.cpp> -<main.cpp>
